services:
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ichigekeen-dev
    container_name: ichigekeen-dev-container
    volumes:
      - ..:/app:cached
      - dev_venv:/app/.venv
      - dev_bash_history:/home/devuser/.bash_history
    working_dir: /app
    tty: true
    stdin_open: true
    environment: {} # Default empty environment
    # For Xvfb, you might set variables like these,
    # but run_with_xvfb.sh typically handles DISPLAY.
    # Consider these if directly running X applications in the container:
    # DISPLAY: ":99"
    # QT_X11_NO_MITSHM: "1"
    # WAYLAND_DISPLAY: "${WAYLAND_DISPLAY}" # If Wayland is involved
    command: bash
# Named volume for bash history persistence
volumes:
  dev_bash_history:
  dev_venv:
