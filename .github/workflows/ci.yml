name: CI

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]
  workflow_dispatch: # Allows manual triggering

jobs:
  build_and_test_docker:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker compose -f docker/docker-compose.yml build dev

    - name: Lint with Ruff
      run: docker compose -f docker/docker-compose.yml run --rm -e HOME=/tmp dev uv run ruff check --no-cache .

    - name: Check formatting with Ruff
      run: docker compose -f docker/docker-compose.yml run --rm -e HOME=/tmp dev uv run ruff format --no-cache --check .

    - name: Run tests
      run: docker compose -f docker/docker-compose.yml run --rm -e HOME=/tmp dev uv run python -m unittest discover -s tests -p 'test_*.py'
